name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: npm install -g markdownlint-cli2

      - name: Lint Markdown
        run: markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Validate JSON files
        run: |
          find data/ -name "*.json" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || { echo "INVALID JSON: $f"; exit 1; }
          done

      - name: Check required root files
        run: |
          for f in README.md CONTRIBUTING.md CHANGELOG.md CODE_OF_CONDUCT.md; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required files present."
